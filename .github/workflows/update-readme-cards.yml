name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"   # runs once daily at midnight UTC
  push:
    branches: [main]
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=dipankar-datasci&show_icons=true&theme=tokyonight&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=dipankar-datasci&layout=compact&theme=tokyonight
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak stats card
        uses: be-next/github-streak-stats-action@v1
        with:
          username: dipankar-datasci
          token: ${{ secrets.GITHUB_TOKEN }}
          output-path: profile/streak.svg
          theme: tokyonight
          hide-border: true

      - name: Commit and push cards if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update README stats cards" && git push)
